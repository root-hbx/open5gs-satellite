name: Feature Request
description: Request a new functionality or module
title: "[Feat]: "
labels: ['feat']
assignees: []
body:
  - type: input
    attributes:
      label: Open5GS Release, Revision, or Tag
      description: Please check if your issue has been resolved in the latest release.
      placeholder: v2.7.4
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe your requirement
      description: >
        Please describe in detail to avoid confusing and misleading statement. Be sure to
        include configuration and platform details.
        It would be better if you can make a demo and take a screen snap around this feature.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behaviour
      description: What do you expect to happen for this functionality?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Suggestions to start
      description: How to get started for this functionality?
    validations:
      required: true
  - type: input
    attributes:
      label: eNodeB/gNodeB
      description: If using an eNB or gNB, please identify which vendor/version
  - type: input
    attributes:
      label: UE Models and versions
      description: Which UE hardware model and version or simulator version are you using?
